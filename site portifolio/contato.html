<!DOCTYPE html>
<html lang="en">
<head>
  <title>tropik contato</title>
  <link rel="stylesheet" href="css/estetica.css">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
body {margin: 0;
        font-family: 'Marcellus', serif;
        background-color: #111;
        color: white;}

.contato {max-width: 800px;
            margin: 10px auto;
            padding: 20px;}

.contato h2 {font-size: 28px;
              margin-bottom: 30px;
              font-weight: normal;
              text-align: center;}

form {display: flex;
        flex-direction: column;
        gap: 15px;}

input, textarea {background: transparent;
                   border: 1px solid #444;
                   padding: 12px;
                   color: white;
                   font-family: 'Marcellus', serif;
                   outline: none;
                   transition: 0.3s;}

input:focus, textarea:focus {border-color: #aaa;}

textarea {height: 120px;
            resize: none;}

button {margin-top: 10px;
          padding: 12px;
          background: white;
          color: black;
          border: none;
          cursor: pointer;
          font-family: 'Marcellus', serif;
          transition: 0.3s;}

button:hover {background: #ccc;}

.duvidas {margin-top: 80px;}

.duvidas h3 {font-weight: normal;
              margin-bottom: 20px;
              text-align: center;}

.info {display: flex;
       flex-direction: column;
       align-items: center;
       gap: 12px;}

.info p {display: flex;
          align-items: center;
          gap: 10px;
          color: #ccc;
          justify-content: center;}

.info i {
  font-size: 18px;
  align-items: center;}
</style>
  

</head>
<body>
<nav class="navbar">
  <div class="logo">
    <a href="index.html">
      <img src="imagens/logo 1.png" alt="Logo">
    </a>
  </div>

  <ul class="menu">
    <li class="dropdown">
      <a href="#">Portifolio</a>
      <ul class="dropdown-menu">
        <li><a href="design.html">Design Gráfico</a></li>
        <li><a href="edicao.html">Edição de vídeo</a></li>
      </ul>
    </li>
    <li class="dropdown"><a href="contato.html">Contato</a></li>
  </ul>
</nav>



<div class="contato">

<br>

  <h2 class="logo-text">Quer contratar um de nossos serviços?</h2>

  <form>
    <input type="text" placeholder="Nome">
    <input type="text" placeholder="Assunto">
    <input type="email" placeholder="E-mail">
    <textarea placeholder="Mensagem"></textarea>
    <button type="submit">Enviar</button>
  </form>

  <div class="duvidas">
    <h3 class="logo-text dois">Dúvidas sobre os produtos? Entre em contato</h3>

    <div class="info">
      <p><i class="bi bi-instagram"></i> @tropik_studio</p>
      <p><i class="bi bi-whatsapp"></i> (11) 99999-9999</p>
      <p><i class="bi bi-linkedin"></i> Tropik Studio</p>
    </div>
  </div>

</div>

<footer class="footer">
  <div class="footer-container">
    <div class="footer-logo">
      <img src="imagens/logo 1.png" alt="Logo">
    </div>
    <div class="footer-info">

      <div class="info-item">
        <i class="bi bi-instagram"></i>
      </div>

      <div class="info-item">
        <i class="bi bi-envelope-fill"></i>
      </div>

      <div class="info-item">
        <i class="bi bi-telephone-fill"></i>
      </div>

      <div class="info-item">
        <i class="bi bi-linkedin"></i>
      </div>

      <div class="info-item">
        <i class="bi bi-whatsapp"></i>
      </div>
    </div>
  </div>
  <div class="footer-bottom">
    <p>© 2026 Tropik Studio — Todos os direitos reservados</p>
    <a href="#">Política de Privacidade</a>
  </div>
</footer>

</body>
</html>
